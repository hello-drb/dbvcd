<body>
<div id="root"></div>
<script type="text/babel">
function App() {
  const [isDark, setIsDark] = React.useState(false);
  const [activeNav, setActiveNav] = React.useState(null);

  React.useEffect(() => {
    const saved = localStorage.getItem("theme");
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    const shouldBeDark = saved === "dark" || (saved === null && prefersDark);
    if (shouldBeDark) {
      document.body.classList.add("dark");
      setIsDark(true);
    }
  }, []);

  const toggleTheme = () => {
    const newState = !isDark;
    setIsDark(newState);
    if (newState) {
      document.body.classList.add("dark");
      localStorage.setItem("theme", "dark");
    } else {
      document.body.classList.remove("dark");
      localStorage.setItem("theme", "light");
    }
  };

  return (
    <>
      <nav className="nav">
        <div className="nav-brand">Drew Bordeaux</div>
        <div className="nav-links">
          <a href="#philosophy">Approach</a>
          <a href="#work">Work</a>
          <a href="#about">About</a>
          <a href="#contact">Contact</a>
          <button
            className={`theme-toggle ${isDark ? "active" : ""}`}
            onClick={toggleTheme}
            aria-label="Toggle dark mode"
          />
        </div>
      </nav>

      <main>
        <section className="hero">
          <h1>
            Philosophy-First <span className="gradient-text">Creative Direction</span>
          </h1>
          <p>
            I help brands and organizations understand who they really are at their core, then build systems and experiences that bring that clarity to life. Combining deep strategic thinking with hands-on creative execution.
          </p>
          <div className="cta-buttons">
            <a href="#work" className="btn btn-primary">
              View Work
            </a>
            <a href="#contact" className="btn btn-secondary">
              Get in Touch
            </a>
          </div>
        </section>

        <section className="philosophy-section" id="philosophy">
          <h2>How I Work</h2>
          <div className="philosophy-cards">
            <div className="philosophy-card">
              <h3>Discovery</h3>
              <p>
                I start by deeply understanding your organization's values, vision, and constraints. This foundation shapes everything that follows, from strategy to execution.
              </p>
            </div>
            <div className="philosophy-card">
              <h3>Clarity</h3>
              <p>
                Through strategic workshops and collaborative analysis, we distill complex organizational identity into clear, actionable principles that guide all future decisions.
              </p>
            </div>
            <div className="philosophy-card">
              <h3>Systems</h3>
              <p>
                With clarity established, I design and build creative systems—visual identities, digital products, content frameworks—that consistently express your core identity at scale.
              </p>
            </div>
          </div>
        </section>

        <section className="work-section" id="work">
          <h2>Recent Work</h2>
          <div className="work-grid">
            <div className="work-item">
              <div className="work-category">Strategy & Identity</div>
              <h3>Brand Clarity Foundation</h3>
              <p>
                Led a comprehensive brand repositioning that shifted perception and articulated core organizational values. Developed strategic frameworks and visual systems.
              </p>
              <a href="#">View case study →</a>
            </div>
            <div className="work-item">
              <div className="work-category">Product Design</div>
              <h3>Data Visualization Platform</h3>
              <p>
                Designed and architected a modern data visualization tool for enterprise clients. Focused on making complex data accessible without sacrificing analytical depth.
              </p>
              <a href="#">View case study →</a>
            </div>
            <div className="work-item">
              <div className="work-category">Content Architecture</div>
              <h3>Thought Leadership Newsletter</h3>
              <p>
                Architected a monthly newsletter that balances accessibility with technical depth. Now reaches 50k+ subscribers across the technology and nonprofit sectors.
              </p>
              <a href="#">View case study →</a>
            </div>
          </div>
        </section>

        <section className="about-section" id="about">
          <h2>About</h2>
          <div className="about-content">
            <div className="about-text">
              <p>
                I'm a <strong>creative director and strategist</strong> with roots in fine art, digital design, and technology. My work combines philosophical rigor with pragmatic execution—I believe the best creative work comes from truly understanding what something should be before deciding how it looks.
              </p>
              <p>
                Over the past decade, I've helped startups, nonprofits, and established organizations clarify their identity and build creative systems that scale. I specialize in <strong>brand strategy</strong>, <strong>digital product design</strong>, and <strong>content architecture</strong>.
              </p>
              <p>
                Currently, I'm exploring how AI can enhance human creative thinking without replacing judgment. I'm interested in building tools and frameworks that help teams make better decisions faster.
              </p>
            </div>
            <div className="about-extras">
              <p>
                I'm based in Brooklyn, NY. When I'm not designing, I'm thinking about complexity, teaching workshops on brand strategy, or writing about the intersection of philosophy and design.
              </p>
              <p style={{ marginTop: "1rem", fontSize: "0.9rem", opacity: "0.7" }}>
                📧 <a href="mailto:hello@drewbordeaux.com">hello@drewbordeaux.com</a>
                <br />
                🔗 <a href="https://linkedin.com/in/drewbordeaux" target="_blank" rel="noopener">LinkedIn</a> · <a href="https://twitter.com/drewbordeaux" target="_blank" rel="noopener">X</a>
              </p>
            </div>
          </div>
        </section>

        <section className="contact-section" id="contact">
          <h2>Let's Work Together</h2>
          <p style={{ fontSize: "1.1rem", marginBottom: "2rem", opacity: "0.9" }}>
            I'm interested in projects where clarity of vision drives better creative outcomes.
          </p>
          <div className="contact-info">
            <div className="contact-item">
              <a href="mailto:hello@drewbordeaux.com">hello@drewbordeaux.com</a>
            </div>
            <div className="contact-item">
              <a href="https://linkedin.com/in/drewbordeaux" target="_blank" rel="noopener">LinkedIn</a>
            </div>
            <div className="contact-item">
              <a href="https://twitter.com/drewbordeaux" target="_blank" rel="noopener">X/Twitter</a>
            </div>
          </div>
        </section>
      </main>

      <footer className="footer">
        <p>&copy; 2024 Drew Bordeaux. All rights reserved.</p>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
